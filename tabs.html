        <h2>tab30</h2>
      </div>
    </div>
    <a href="#tab20">tab21</a>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Create tabs dynamically
            for (let i = 1; i <= 30; i++) {
                const tabId = (i === 20 || i === 21) ? 'tab20' : 'tab' + i;
                createTab(tabId);
            }
    
            // Scroll to #tab23 when the page loads
            scrollToTab('tab23');
        });
    
        function createTab(tabId) {
            // Create tab element
            const tab = document.createElement('div');
            tab.id = tabId;
            tab.className = 'tab';
    
            // Set random background color
            const randomColor = getRandomColor();
            tab.style.backgroundColor = randomColor;
    
            // Set text content
            tab.innerHTML = `<h2>${tabId}</h2>`;
            
            // Append tab to tabs container
            document.getElementById('tabs-container').appendChild(tab);
        }
    
        function getRandomColor() {
            // Generate a random hex color
            return '#' + Math.floor(Math.random()*16777215).toString(16);
        }
    
        function scrollToTab(tabId) {
            // Scroll to the specified tab
            const tabElement = document.getElementById(tabId);
            if (tabElement) {
                tabElement.scrollIntoView({ behavior: 'smooth' });
            }
        }
    </script>
  </body>
</html>
